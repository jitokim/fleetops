# yamllint configuration for this repo's workflow and config YAML.
#
# yamllint's default ruleset is not calibrated for GitHub Actions, and running
# it unmodified produces a wall of findings that are all style preference or
# outright false positives. Each rule disabled below was measured on this
# repo's own files (2026-07-19) and is disabled for a stated reason, not to
# make a number go to zero:
#
#   truthy         — flags `on:` as a bad boolean. It is a GitHub keyword, not
#                    a boolean. The single most common yamllint/Actions false
#                    positive.
#   document-start — wants a leading `---`. GitHub's own workflow docs and
#                    every example omit it; adding it repo-wide would be churn
#                    in service of a convention nothing here follows.
#   line-length    — defaults to 80. This repo deliberately writes long
#                    explanatory comments in workflows (see any of them), which
#                    is a house convention worth more than the column limit.
#   comments       — wants two spaces before an inline comment. Our SHA pins
#                    are written `<sha> # vX.Y.Z`, matching dependabot's own
#                    output; reformatting them would fight the tool that
#                    maintains them.
#
# What REMAINS enabled is the part with actual bite: syntax errors, duplicate
# keys, bad indentation, broken anchors. Those are real defects in a file
# format where a typo silently changes behaviour rather than failing loudly.
extends: default

rules:
  truthy: disable
  document-start: disable
  line-length: disable
  comments: disable
  comments-indentation: disable
