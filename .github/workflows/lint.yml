# Lints the repo's own automation: workflow YAML, the shell inside it, and the
# standalone scripts under .github/scripts.
#
# These three tools were run by hand once (2026-07-19) and found real problems
# the Go test suite structurally cannot see — `go test` says nothing about a
# workflow that requests the wrong token scope or a script with an unquoted
# expansion. A one-off run only proves the state on the day it ran, so the
# checks live here instead.
#
# Scoped to `.github/**` on purpose: this workflow lints AUTOMATION, not the
# product. Go code is covered by root-test.yml, and widening the trigger would
# make every product PR wait on a job that cannot say anything about it.
name: lint

on:
  push:
    paths:
      - '.github/**'
      - '.yamllint.yml'
  pull_request:
    paths:
      - '.github/**'
      - '.yamllint.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint workflows and scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned per the repo-wide policy documented in
      # pr-review-dispatch.yml's header.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # actionlint understands Actions' own schema — expression syntax, event
      # names, `needs` references — none of which a generic YAML linter can
      # check. It ALSO shells out to shellcheck for every `run:` block, which
      # is why shellcheck is installed before it runs: without shellcheck on
      # PATH actionlint silently skips that half and still exits 0, so the
      # order here is load-bearing rather than incidental.
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run actionlint
        # Installed from source with the runner's Go rather than via a
        # third-party action: one less action to pin and audit, and the
        # version is pinned here in plain sight.
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" .github/workflows/*.yml

      # The standalone scripts are not inside any `run:` block, so actionlint
      # never sees them.
      - name: Run shellcheck on .github/scripts
        run: shellcheck .github/scripts/*.sh

      # Tripwire, not a linter rule: actions/checkout v7 made fork-PR code
      # checkout an explicit opt-in under `pull_request_target`/`workflow_run`.
      # That flag is precisely the "pwn request" escape hatch — turning it on
      # runs untrusted contributor code in a context that already holds write
      # scopes and repository secrets. Two workflows here use
      # pull_request_target (duplicate-detect, labeler), so the hatch is
      # reachable.
      #
      # This is deliberately a HARD FAIL rather than a warning. If the flag
      # ever appears it is a security decision, not a config tweak, and it
      # should not be able to ride in on a routine PR — someone has to remove
      # this check on purpose, which is a reviewable act.
      #
      # The exclusion is not laziness: this file necessarily CONTAINS the
      # string it searches for, so an unexcluded grep would match its own
      # source and fail forever. Excluding exactly one path keeps the check
      # honest everywhere else.
      - name: Refuse unsafe fork-PR checkout
        run: |
          if grep -rn --exclude=lint.yml 'allow-unsafe-pr-checkout' .github/; then
            echo "::error::allow-unsafe-pr-checkout found. This runs untrusted fork code with write scopes — it is a security decision, not a config change. If it is genuinely intended, remove this check in the same PR so the intent is reviewable."
            exit 1
          fi
          echo "No unsafe fork-PR checkout opt-in found."

      # Config lives in .yamllint.yml, which documents why each disabled rule
      # is disabled. What stays on is the structural half: syntax, duplicate
      # keys, indentation, anchors.
      - name: Run yamllint
        run: |
          pipx install yamllint
          yamllint -c .yamllint.yml .github/
