# Rule-based PR labeling config for actions/labeler (v6).
#
# No LLM/AI involved by design (captain directive: zero AI API usage) — every
# rule below is a path glob or branch-name pattern checked against the diff.
#
# The `area/*` labels mirror this repo's actual `internal/*` package
# boundaries 1:1 (see CONTRIBUTING.md's "Making changes" section on keeping
# changes focused per package), plus one per real top-level `tools/<name>`
# module. Add a new `area/*` entry only when that directory is actually
# created — do not pre-create labels for packages that don't exist yet.
#
# The failure this guards against is silent: a PR touching a directory with no
# matching rule simply receives no area label, which reads as "this change is
# unclassified" rather than "the taxonomy is stale". Three such gaps were found
# at once on 2026-07-19 (tools/, internal/settings/, internal/worktree/), each
# created by a PR that added the directory without adding the rule.

# --- area labels: one per real cmd/ and internal/ package ---

area/cmd:
  - changed-files:
      - any-glob-to-any-file: 'cmd/**'

area/claude:
  - changed-files:
      - any-glob-to-any-file: 'internal/claude/**'

area/control:
  - changed-files:
      - any-glob-to-any-file: 'internal/control/**'

area/domain:
  - changed-files:
      - any-glob-to-any-file: 'internal/domain/**'

area/engine:
  - changed-files:
      - any-glob-to-any-file: 'internal/engine/**'

area/events:
  - changed-files:
      - any-glob-to-any-file: 'internal/events/**'

area/fsatomic:
  - changed-files:
      - any-glob-to-any-file: 'internal/fsatomic/**'

area/gate:
  - changed-files:
      - any-glob-to-any-file: 'internal/gate/**'

area/hidden:
  - changed-files:
      - any-glob-to-any-file: 'internal/hidden/**'

area/notify:
  - changed-files:
      - any-glob-to-any-file: 'internal/notify/**'

area/oracle:
  - changed-files:
      - any-glob-to-any-file: 'internal/oracle/**'

area/registry:
  - changed-files:
      - any-glob-to-any-file: 'internal/registry/**'

area/sessions:
  - changed-files:
      - any-glob-to-any-file: 'internal/sessions/**'

area/settings:
  - changed-files:
      - any-glob-to-any-file: 'internal/settings/**'

area/tui:
  - changed-files:
      - any-glob-to-any-file: 'internal/tui/**'

area/tools:
  - changed-files:
      - any-glob-to-any-file: 'tools/**'

area/worktree:
  - changed-files:
      - any-glob-to-any-file: 'internal/worktree/**'

# --- cross-cutting labels ---

docs:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'

build/ci:
  - changed-files:
      - any-glob-to-any-file:
          - 'Makefile'
          - '.github/**'

deps:
  - changed-files:
      - any-glob-to-any-file:
          - 'go.mod'
          - 'go.sum'
